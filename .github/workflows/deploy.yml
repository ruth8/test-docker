name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # 如果你是 master 就改成 master

permissions:
  contents: write   # 🔥 必须有

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .